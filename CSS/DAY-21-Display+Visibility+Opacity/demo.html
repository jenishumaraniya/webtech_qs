<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0px;
        margin: 0px;
      }
      .box {
        width: 100%;
        height: 100vh;
        background-color: red;
        display: grid;
        grid-template-columns: 1fr 1fr 2fr 1fr;
        gap: 20px;
      }

      .sub-box {
        padding: 20px;
        background-color: blue;
        color: white;
      }
      @media (max-width: 720px) {
        .box {
          background-color: blue;
          grid-template-columns: 1fr 1fr 1fr;
        }
      }
      @media (max-width: 300px) {
        .box {
          background-color: green;
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="sub-box" id="sub-box1">Sub-box-1</div>
      <div class="sub-box" id="sub-box2">Sub-box-2</div>
      <div class="sub-box" id="sub-box3">Sub-box-3</div>
      <div class="sub-box" id="sub-box4">Sub-box-4</div>
      <div class="sub-box" id="sub-box5">Sub-box-5</div>
      <div class="sub-box" id="sub-box6">Sub-box-6</div>
      <div class="sub-box" id="sub-box7">Sub-box-7</div>
      <div class="sub-box" id="sub-box8">Sub-box-8</div>
      <div class="sub-box" id="sub-box9">Sub-box-9</div>
      <div class="sub-box" id="sub-box10">Sub-box-10</div>
    </div>
  </body>
</html>
