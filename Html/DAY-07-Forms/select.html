<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>select tag in Forms - (dropdown list)</h1>
    <form action="">
      <label for="">Skills:</label>
      <select name="selectedSkill" id="" multiple size="1">
        <option value="" disabled>---Select any one skill---</option>
        <optgroup label="Frontend Courses">
          <option value="HTML">HTML</option>
          <option value="CSS">CSS</option>
          <option value="JS">JS</option>
          <option value="TailwindCSS">Tailwind CSS</option>
          <option value="ReactJS">React JS</option>
        </optgroup>
        <optgroup label="Backend Courses">
          <option value="Java">Java</option>
          <option value="Python">Python</option>
          <option value="Node.js">Node.js</option>
          <option value="Express.js">Express.js</option>
        </optgroup>
        <optgroup label="Database Courses">
          <option value="SQL">SQL</option>
          <option value="MongoDB">MongoDB</option>
          <option value="PostgreSQL">PostgreSQL</option>
        </optgroup>
      </select>
      <button>Submit Skill</button>
    </form>
  </body>
</html>
