<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend><h1>Job Application Form</h1></legend>
        <table>
          <tr>
            <td>FirstName:</td>
            <td><input type="text" name="firstname" id="firstname" /></td>
          </tr>
          <tr>
            <td>LastName:</td>
            <td><input type="text" name="lastname" id="lastname" /></td>
          </tr>
          <tr>
            <td>Email:</td>
            <td><input type="email" name="email" id="email" /></td>
          </tr>
          <tr>
            <td>Phone Number:</td>
            <td><input type="tel" name="contact" id="contact" /></td>
          </tr>
          <tr>
            <td>DOB:</td>
            <td><input type="date" name="dob" id="dob" /></td>
          </tr>
          <tr>
            <td>Gender:</td>
            <td>
              <label for="male">
                <input type="radio" name="gender" id="male" value="male" /> Male
              </label>
              <label for="female">
                <input type="radio" name="gender" id="female" value="female" />
                Female
              </label>
              <label for="others">
                <input type="radio" name="gender" id="others" value="others" />
                Others
              </label>
            </td>
          </tr>
          <tr>
            <td>Skills:</td>
            <td>
              <label for="html">
                <input type="checkbox" name="skill" id="html" value="HTML" />
                HTML
              </label>
              <label for="css">
                <input type="checkbox" name="skill" id="css" value="CSS" /> CSS
              </label>
              <label for="js">
                <input type="checkbox" name="skill" id="js" value="JS" /> JS
              </label>
            </td>
          </tr>
          <tr>
            <td>Address:</td>
            <td>
              <textarea name="address" id=""></textarea>
            </td>
          </tr>
          <tr>
            <td>City:</td>
            <td><input type="text" name="city" id="city" /></td>
          </tr>
          <tr>
            <td>State:</td>
            <td>
              <select name="state" id="state">
                <option value="" disabled selected>
                  --Select your state--
                </option>
                <option value="Gujarat">Gujarat</option>
                <option value="Rajasthan">Rajasthan</option>
                <option value="Maharashtra">Maharashtra</option>
                <option value="Punjab">Punjab</option>
                <option value="West Bengal">West Bengal</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>Pincode:</td>
            <td><input type="number" name="pincode" id="pincode" /></td>
          </tr>
          <tr>
            <td>Position Applied For:</td>
            <td>
              <input type="text" list="role" name="role" />
              <datalist id="role">
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Full-Stack Developer">
                  Full-Stack Developer
                </option>
                <option value="MERN Stack Developer">
                  MERN Stack Developer
                </option>
                <option value="Data Analyst">Data Analyst</option>
                <option value="Data Science">Data Science</option>
              </datalist>
            </td>
          </tr>
          <tr>
            <td>Upload Resume:</td>
            <td>
              <input
                type="file"
                name="resume"
                id="resume"
                accept=".pdf"
                multiple
              />
            </td>
          </tr>
          <tr>
            <td>LinkedIn Profile:</td>
            <td><input type="url" name="linkedinurl" id="linkedinurl" /></td>
          </tr>
          <tr>
            <td>Available Start Date:</td>
            <td><input type="date" name="startdate" id="startdate" /></td>
          </tr>
          <tr>
            <td>Expected Salary:</td>
            <td>
              Min 10000
              <input
                type="range"
                name="salary"
                id="salary"
                min="10000"
                max="50000"
                step="10000"
              />
              Max 50000
            </td>
          </tr>
          <tr>
            <td>Wiling to Relocate:</td>
            <td>
              <select name="relocate" id="relocate">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>
            </td>
          </tr>
          <tr>
            <td><input type="reset" value="Reset" /></td>
            <td><input type="submit" value="Submit Application" /></td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
