<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <marquee behavior="slide" direction="right">
      <h1>
        I will be stopped automatically when i reach to the extreme right side
      </h1>
    </marquee>
    <marquee behavior="slide" direction="right" scrollamount="15">
      <h1>
        I will be stopped automatically when i reach to the extreme right side
      </h1>
    </marquee>
    <marquee behavior="slide" direction="right" scrolldelay="100">
      <h1>
        I will be stopped automatically when i reach to the extreme right side
      </h1>
    </marquee>
  </body>
</html>
