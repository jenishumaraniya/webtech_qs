<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>vspace and hspace</h1>
    <marquee
      behavior="scroll"
      direction="left"
      bgcolor="yellow"
      scrollamount="20"
      vspace="100px"
    >
      <h1>Text it is moving</h1>
    </marquee>
    
    <marquee
      behavior="scroll"
      direction="left"
      bgcolor="purple"
      scrollamount="20"
      hspace="100px"
    >
      <h1>Text it is moving</h1>
    </marquee>
  </body>
</html>
