<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>iframe tag</h1>
    <iframe
      src="https://www.indiatvnews.com/"
      frameborder="1"
      width="500"
      height="300"
    ></iframe>
    <hr />
    <iframe
      src="https://www.geeksforgeeks.org/"
      frameborder="1"
      width="500"
      height="200"
    ></iframe>
    <hr />
    <h2>Embedding you tube videos by using iframe tag</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/zzwRbKI2pn4?si=kP3sUvcobZJRt6PA"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
    <hr />
    <h2>Embedding google maps by using iframe tag</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d944102.713426492!2d72.4695683638958!3d22.432743286208204!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39601d55e43af21f%3A0xb8e23c01a1f6eb18!2sStatue%20Of%20Unity!5e0!3m2!1sen!2sin!4v1769154202345!5m2!1sen!2sin"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    <hr />
    <h2>Embedding webpage</h2>
    <iframe src="./ExternalPage.html" frameborder="1"></iframe>
  </body>
</html>
