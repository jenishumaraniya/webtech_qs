<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Student Data
      </caption>
      <!-- Table Heading Data - thead -->

        <tr>
          <th>Sr.No</th>
          <th>Name</th>
          <th>Hobby</th>
        </tr>
      </thead>
      <!-- Table Body (main Content of a table) - tbody -->
      <tbody>
        <tr>
          <td>1.</td>
          <td>Harshal</td>
          <td>Cricket</td>
        </tr>
        <tr>
          <td>2.</td>
          <td>Viren</td>
          <td>Football</td>
        </tr>
      </tbody>
      <!-- Table footer - tfoot -->
      <tfoot>
        <tr>
          <td>Total Students</td>
          <td>2</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
