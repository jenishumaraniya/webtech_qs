<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>tabindex attribute</h2>
    <a tabindex="3" href="https://www.google.com">Google</a> <br />
    <a tabindex="2" href="https://www.facebook.com">Facebook</a> <br />
    <a tabindex="1" href="https://www.instagram.com">Instagram</a>
    <hr />
    <h2>accesskey attribute- (ALT + char)</h2>
    <a accesskey="g" href="https://www.google.com">Google</a> <br />
    <a accesskey="k" href="https://www.facebook.com">Facebook</a> <br />
    <a accesskey="i" href="https://www.instagram.com">Instagram</a>
  </body>
</html>
