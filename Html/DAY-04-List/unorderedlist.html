<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Unordered List in HTML</h1>
    <!-- The list which does not follow any kind of order is called as unordered list -->
    <ul>
      <li>Iron Man</li>
      <li>Blue Beetle</li>
      <li>Shaktiman</li>
      <li>Krish:Ka Gaana sunega?</li>
    </ul>
    <hr />
    <ul type="circle">
      <li>Iron Man</li>
      <li>Blue Beetle</li>
      <li>Shaktiman</li>
      <li>Krish:Ka Gaana sunega?</li>
    </ul>
    <hr />
    <ul type="square">
      <li>Iron Man</li>
      <li>Blue Beetle</li>
      <li>Shaktiman</li>
      <li>Krish:Ka Gaana sunega?</li>
    </ul>
    <hr />
    <ul type="none">
      <li>Home</li>
      <li>Login</li>
      <li>Register</li>
    </ul>
  </body>
</html>
